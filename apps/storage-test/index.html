<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storage Test</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0d1117;
      color: #e5e7eb;
      font-family: -apple-system, sans-serif;
    }
    h1 { font-size: 64px; margin: 0 0 24px; }
    button {
      padding: 10px 24px;
      margin: 4px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      background: #5865f2;
      color: white;
    }
    button:hover { background: #4752c4; }
  </style>
</head>
<body>
  <h1 id="count">0</h1>
  <div>
    <button id="dec">−</button>
    <button id="inc">+</button>
    <button id="reset">Reset</button>
  </div>

  <script type="module">
    import { ready, storage } from '../../sdk/index.js'

    await ready()

    const countEl = document.getElementById('count')

    async function load() {
      const saved = await storage.get('count')
      countEl.textContent = String(saved ?? 0)
    }

    async function save(value) {
      countEl.textContent = String(value)
      await storage.set('count', value)
    }

    await load()

    document.getElementById('inc').addEventListener('click', async () => {
      await save(Number(countEl.textContent) + 1)
    })

    document.getElementById('dec').addEventListener('click', async () => {
      await save(Number(countEl.textContent) - 1)
    })

    document.getElementById('reset').addEventListener('click', async () => {
      await save(0)
    })
  </script>
</body>
</html>
