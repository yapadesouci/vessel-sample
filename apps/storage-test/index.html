<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storage Test</title>
  <link rel="stylesheet" href="vessel://sdk.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .counter { font-size: 72px; font-weight: 700; color: var(--vs-text); text-align: center; margin: 16px 0; }
    .actions { display: flex; gap: 8px; justify-content: center; }
  </style>
</head>
<body>
  <script src="vessel://sdk.js"></script>
  <div class="vs-card" style="width: 320px; text-align: center;">
    <p class="vs-subheading" style="margin-bottom: 4px;">Storage Test</p>
    <p class="vs-heading" style="margin-bottom: 0;">Counter</p>
    <div class="counter" id="count">—</div>
    <div class="actions">
      <button class="vs-btn vs-btn-ghost vs-btn-lg" id="dec">−</button>
      <button class="vs-btn vs-btn-ghost vs-btn-lg" id="reset">Reset</button>
      <button class="vs-btn vs-btn-primary vs-btn-lg" id="inc">+</button>
    </div>
    <p class="vs-caption" style="margin-top: 12px;" id="status">Loading…</p>
  </div>

  <script type="module">
    await vessel.ready

    const countEl = document.getElementById('count')
    const statusEl = document.getElementById('status')

    async function load() {
      const saved = await vessel.storage.get('count')
      countEl.textContent = String(saved ?? 0)
      statusEl.textContent = 'Stored in vessel.storage'
    }

    async function save(value) {
      countEl.textContent = String(value)
      await vessel.storage.set('count', value)
    }

    await load()

    document.getElementById('inc').addEventListener('click', () => save(Number(countEl.textContent) + 1))
    document.getElementById('dec').addEventListener('click', () => save(Number(countEl.textContent) - 1))
    document.getElementById('reset').addEventListener('click', () => save(0))
  </script>
</body>
</html>
